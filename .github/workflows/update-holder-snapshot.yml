name: Update holder snapshot

on:
  workflow_dispatch:

  schedule:
    # Every hour, at minute 17 UTC.
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: ansem-holder-snapshot
  cancel-in-progress: false

jobs:
  update:
    name: Scan ANSEM holders
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update holder snapshot
        run: npm run snapshot:holders

      - name: Clean expired claim nonces
        run: npm run cleanup:nonces
